version: '3.8'

services:
  bot:
    build: .
    container_name: contest_bot
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DB_HOST=db
    volumes:
      # Монтируем директории для сохранения скриншотов, экспортов и логов на сервере
      - ./data:/app/data
      - ./exports:/app/exports
      - ./logs:/app/logs
      # Монтируем config.json, чтобы изменения настроек сохранялись на хост-машине
      - ./config.json:/app/config.json

  db:
    image: postgres:15-alpine
    container_name: contest_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-bot_db}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-bot_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
